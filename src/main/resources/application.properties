spring.config.import=optional:file:./.env[.properties]
spring.application.name=tokenlearn-server
server.port=${SERVER_PORT:${TOKENLEARN_SERVER_PORT:8080}}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:${TOKENLEARN_SQLSERVER_PORT:1433};databaseName=${TOKENLEARN_DB_NAME:tokenlearn};encrypt=${TOKENLEARN_DB_ENCRYPT:false}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${TOKENLEARN_DB_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${TOKENLEARN_DB_PASSWORD}}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:${TOKENLEARN_FLYWAY_ENABLED:true}}

spring.artemis.mode=${SPRING_ARTEMIS_MODE:native}
spring.artemis.broker-url=${SPRING_ARTEMIS_BROKER_URL:tcp://localhost:${TOKENLEARN_ARTEMIS_BROKER_PORT:61616}}
spring.artemis.user=${SPRING_ARTEMIS_USER:${TOKENLEARN_ARTEMIS_USER:admin}}
spring.artemis.password=${SPRING_ARTEMIS_PASSWORD:${TOKENLEARN_ARTEMIS_PASSWORD}}
spring.jms.pub-sub-domain=false

jwt.secret=${JWT_SECRET:${TOKENLEARN_JWT_SECRET}}
jwt.expiration=${JWT_EXPIRATION:${TOKENLEARN_JWT_EXPIRATION:86400000}}

app.reset-token-exp-minutes=15
app.lesson-request-approval-buffer-hours=6
app.lesson-request-expiration-scan-ms=60000
app.lesson-request-expiration-initial-delay-ms=60000
app.lesson-auto-complete-scan-ms=60000
app.lesson-auto-complete-initial-delay-ms=60000
app.welcome-bonus-users=50
app.welcome-bonus-amount=50
app.course-catalog.enabled=${APP_COURSE_CATALOG_ENABLED:true}
app.course-catalog.path=${APP_COURSE_CATALOG_PATH:${TOKENLEARN_COURSE_CATALOG_HOST_PATH:../openu_all_courses.json}}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

logging.level.root=INFO
logging.level.com.tokenlearn=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.jdbc=INFO

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Google Sign-In
google.client-id=${GOOGLE_CLIENT_ID:${TOKENLEARN_GOOGLE_CLIENT_ID:}}
