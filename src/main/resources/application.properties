spring.application.name=tokenlearn-server
server.port=8080

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=tokenlearn;encrypt=false
spring.datasource.username=sa
spring.datasource.password=YourPassword123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

spring.artemis.mode=native
spring.artemis.broker-url=tcp://localhost:61616
spring.artemis.user=admin
spring.artemis.password=admin
spring.jms.pub-sub-domain=false

jwt.secret=VG9rZW5MZWFyblNlcnZlclNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbkFuZFZlcmlmaWNhdGlvbg==
jwt.expiration=86400000

app.reset-token-exp-minutes=15
app.lesson-request-approval-buffer-hours=6
app.lesson-request-expiration-scan-ms=60000
app.lesson-request-expiration-initial-delay-ms=60000
app.welcome-bonus-users=50
app.welcome-bonus-amount=50
app.course-catalog.enabled=true
app.course-catalog.path=../openu_all_courses.json

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

logging.level.root=INFO
logging.level.com.tokenlearn=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.jdbc=INFO

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

