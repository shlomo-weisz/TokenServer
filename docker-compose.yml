services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tokenlearn-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${TOKENLEARN_DB_PASSWORD:?TOKENLEARN_DB_PASSWORD is required}"
      MSSQL_PID: "${TOKENLEARN_MSSQL_PID:-Developer}"
    ports:
      - "${TOKENLEARN_SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  artemis:
    image: vromero/activemq-artemis:latest
    container_name: tokenlearn-artemis
    environment:
      ARTEMIS_USERNAME: "${TOKENLEARN_ARTEMIS_USER:-admin}"
      ARTEMIS_PASSWORD: "${TOKENLEARN_ARTEMIS_PASSWORD:?TOKENLEARN_ARTEMIS_PASSWORD is required}"
    ports:
      - "${TOKENLEARN_ARTEMIS_BROKER_PORT:-61616}:61616"
      - "${TOKENLEARN_ARTEMIS_WEB_PORT:-8161}:8161"
    restart: unless-stopped

  tokenlearn-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tokenlearn-server
    depends_on:
      - sqlserver
      - artemis
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=${TOKENLEARN_DB_NAME:-tokenlearn};encrypt=${TOKENLEARN_DB_ENCRYPT:-false}"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "${TOKENLEARN_DB_PASSWORD:?TOKENLEARN_DB_PASSWORD is required}"
      SPRING_ARTEMIS_MODE: "native"
      SPRING_ARTEMIS_BROKER_URL: "tcp://artemis:61616"
      SPRING_ARTEMIS_USER: "${TOKENLEARN_ARTEMIS_USER:-admin}"
      SPRING_ARTEMIS_PASSWORD: "${TOKENLEARN_ARTEMIS_PASSWORD:?TOKENLEARN_ARTEMIS_PASSWORD is required}"
      JWT_SECRET: "${TOKENLEARN_JWT_SECRET:?TOKENLEARN_JWT_SECRET is required}"
      JWT_EXPIRATION: "${TOKENLEARN_JWT_EXPIRATION:-86400000}"
      GOOGLE_CLIENT_ID: "${TOKENLEARN_GOOGLE_CLIENT_ID:-}"
      SPRING_FLYWAY_ENABLED: "${TOKENLEARN_FLYWAY_ENABLED:-true}"
      APP_COURSE_CATALOG_PATH: "${TOKENLEARN_COURSE_CATALOG_CONTAINER_PATH:-/app/openu_all_courses.json}"
    ports:
      - "${TOKENLEARN_SERVER_PORT:-8080}:8080"
    volumes:
      - ${TOKENLEARN_COURSE_CATALOG_HOST_PATH:-../openu_all_courses.json}:${TOKENLEARN_COURSE_CATALOG_CONTAINER_PATH:-/app/openu_all_courses.json}:ro
    restart: on-failure

volumes:
  sqlserver_data:
